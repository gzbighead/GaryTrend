name: 美股龙头候选

on:
  repository_dispatch:
    types: [run_leader_us]

  # GitHub 页面手动触发
  workflow_dispatch:
    inputs:
      period:
        description: "数据周期 (e.g. 2y / 1y / 6mo)"
        required: false
        default: "5y"

jobs:
  leader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python依赖
        run: pip install yfinance numpy requests

      - name: 运行龙头捕捉
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python leader_us.py
