name: 美股趋势报告

on:
  repository_dispatch:
    types: [run_report_us]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python依赖
        run: pip install yfinance numpy requests

      - name: 运行报告
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python report_us.py
